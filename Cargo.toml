[package]
name = "eti-rtlsdr-rust"
version = "0.1.0"
edition = "2021"
authors = ["Your Name"]

[dependencies]
clap = { version = "4.4", features = ["derive"] }
anyhow = "1.0"
ctrlc = "3.4"
rustfft = "6.4"
num-complex = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rayon = "1.10"

[build-dependencies]
bindgen = "0.69"
cmake = "0.1"

[[bin]]
name = "eti-rtlsdr-rust"
path = "src/main.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
